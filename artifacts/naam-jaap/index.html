<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Naam Jaap Sewa</title>
    <!-- Suppress AbortError from TanStack Query refetch cancellations.
         Must run in capture phase so it fires BEFORE Vite's error overlay handler. -->
    <script>
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason;
        if (r && (r.name === 'AbortError' || (typeof r.message === 'string' && r.message.indexOf('aborted') !== -1))) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
